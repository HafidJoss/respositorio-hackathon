<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .clinical-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 63, 177, 0.05), 0 2px 10px -2px rgba(0, 0, 0, 0.02);
        }
        .transition-soft {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-container-padding-mobile md:p-container-padding-desktop relative overflow-hidden">
<!-- Background Elements -->
<div class="absolute top-0 left-0 w-full h-full opacity-5 pointer-events-none overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 rounded-full bg-primary blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 rounded-full bg-accent-gold blur-3xl"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-md z-10">
<!-- Header / Brand -->
<header class="flex flex-col items-center mb-stack-lg animate-fade-in">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-stack-md clinical-shadow">
<span class="material-symbols-outlined text-[40px] text-on-primary" data-icon="monitor_heart" style="font-variation-settings: 'FILL' 1;">monitor_heart</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary text-center">
                Centro de Monitoreo Médico
            </h1>
</header>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant p-stack-lg rounded-xl clinical-shadow">
<div class="mb-stack-lg text-center">
<h2 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface">
                    Bienvenido al Portal Clínico
                </h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-base">
                    Ingrese sus credenciales para acceder al sistema
                </p>
</div>
<form class="space-y-stack-md" onsubmit="event.preventDefault();">
<!-- Role Selection -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant ml-base">Tipo de Usuario</label>
<div class="grid grid-cols-2 p-1 bg-surface-container rounded-lg gap-1 border border-outline-variant">
<button class="role-btn transition-soft font-label-md text-label-md py-2 rounded-lg flex items-center justify-center gap-2 bg-white text-primary clinical-shadow border border-accent-gold" id="role-doctor" onclick="setRole('doctor')" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="medical_services">medical_services</span>
                            Soy Médico
                        </button>
<button class="role-btn transition-soft font-label-md text-label-md py-2 rounded-lg flex items-center justify-center gap-2 text-on-surface-variant hover:bg-surface-container-high" id="role-nurse" onclick="setRole('nurse')" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="person_play">person_play</span>
                            Soy Enfermero
                        </button>
</div>
</div>
<!-- DNI / Usuario -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant ml-base" for="dni">DNI / Usuario</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="badge">badge</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md outline-none transition-soft" id="dni" placeholder="Ej: 12345678X" type="text"/>
</div>
</div>
<!-- Contraseña -->
<div class="space-y-base">
<div class="flex justify-between items-center px-base">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Contraseña</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">¿Olvidó su clave?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md outline-none transition-soft" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center px-base">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary" id="remember" type="checkbox"/>
<label class="ml-2 font-label-md text-label-md text-on-surface-variant cursor-pointer" for="remember">Mantener sesión iniciada</label>
</div>
<!-- Login Button -->
<button class="w-full bg-primary-container hover:bg-primary text-on-primary font-label-md text-headline-md py-4 rounded-lg flex items-center justify-center gap-2 clinical-shadow transition-soft active:scale-[0.98]" type="submit">
                    Iniciar Sesión
                    <span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</form>
</div>
<!-- Footer Help -->
<footer class="mt-stack-lg flex flex-col items-center gap-2">
<p class="font-label-sm text-label-sm text-outline text-center">
                © 2024 Centro de Monitoreo Médico. Todos los derechos reservados.
            </p>
<div class="flex gap-stack-md">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Soporte Técnico</a>
<span class="text-outline-variant">|</span>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Política de Privacidad</a>
</div>
</footer>
</main>
<!-- Side Image Decoration (Hidden on small mobile) -->
<div class="hidden lg:block fixed left-12 bottom-12 w-48 h-48 opacity-20 pointer-events-none">
<div class="w-full h-full bg-contain bg-no-repeat bg-center" data-alt="A clean, minimalist medical illustration of a glowing DNA strand and clinical pulse line. The style is professional and high-tech with a focus on medical monitoring. The palette uses deep primary blue and soft golden yellow accents on a white high-contrast background." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBG56UvPbdOv-fb5lgYt0NNdgJgG6Gkr4PpZ8pQrjzxU5pz3CVwBH0ABOp_L1jBA02m5j_KWDl0293_uiJaTY2BWIIIT3_DNVUCcebMbzaANao-E15dc-yNFdhevhhLZ1LWoVWdqNS2C89Yi-AGgq8kZaV-HLoiMSz0N4x4Tml32XVYY8-IMwfLTUhOXIYCgwO2W5pIidMk-S3aK7VNlOOeR1FHFqW-eAID3MG3w08mNO_ftI93cIiQ-KneVbkuGeFylm1Ma9Ra5Aw')"></div>
</div>
<script>
        function setRole(role) {
            const drBtn = document.getElementById('role-doctor');
            const nurseBtn = document.getElementById('role-nurse');
            
            if (role === 'doctor') {
                drBtn.classList.add('bg-white', 'text-primary', 'clinical-shadow', 'border-accent-gold');
                drBtn.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-high');
                
                nurseBtn.classList.remove('bg-white', 'text-primary', 'clinical-shadow', 'border-accent-gold');
                nurseBtn.classList.add('text-on-surface-variant', 'hover:bg-surface-container-high');
            } else {
                nurseBtn.classList.add('bg-white', 'text-primary', 'clinical-shadow', 'border-accent-gold');
                nurseBtn.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-high');
                
                drBtn.classList.remove('bg-white', 'text-primary', 'clinical-shadow', 'border-accent-gold');
                drBtn.classList.add('text-on-surface-variant', 'hover:bg-surface-container-high');
            }
        }
    </script>
</body></html>
